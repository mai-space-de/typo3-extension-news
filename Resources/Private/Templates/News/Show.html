<f:layout name="Default" />

<f:section name="Title">{newsArticle.title}</f:section>

<f:section name="Content">
    <article class="news-detail">
        <f:link.action action="list" class="news-detail__back">← Back to overview</f:link.action>

        <header class="news-detail__header">
            <h1 class="news-detail__title">{newsArticle.title}</h1>
            <div class="news-detail__meta">
                <f:if condition="{newsArticle.publishDate}">
                    <time class="news-detail__date" datetime="{newsArticle.publishDate -> f:format.date(format: 'Y-m-d')}">
                        <f:format.date date="{newsArticle.publishDate}" format="d. F Y" />
                    </time>
                </f:if>
                <f:if condition="{newsArticle.author}">
                    <span class="news-detail__author">by {newsArticle.author}</span>
                </f:if>
            </div>
        </header>

        <f:if condition="{newsArticle.image}">
            <figure class="news-detail__image">
                <f:image image="{newsArticle.firstImage}" alt="{newsArticle.title}" width="900c" height="500c" class="img-fluid" />
            </figure>
        </f:if>

        <f:if condition="{newsArticle.teaser}">
            <p class="news-detail__teaser lead">{newsArticle.teaser}</p>
        </f:if>

        <div class="news-detail__body">
            <f:format.html>{newsArticle.bodyText}</f:format.html>
        </div>

        <footer class="news-detail__footer">
            <f:if condition="{newsArticle.categories}">
                <div class="news-detail__categories">
                    <strong>Categories:</strong>
                    <ul>
                        <f:for each="{newsArticle.categories}" as="category">
                            <li>
                                <f:link.action action="list" arguments="{category: category}">{category.title}</f:link.action>
                            </li>
                        </f:for>
                    </ul>
                </div>
            </f:if>

            <f:if condition="{newsArticle.tagsArray}">
                <div class="news-detail__tags">
                    <strong>Tags:</strong>
                    <ul>
                        <f:for each="{newsArticle.tagsArray}" as="tag">
                            <li>
                                <f:link.action action="list" arguments="{tag: tag}">{tag}</f:link.action>
                            </li>
                        </f:for>
                    </ul>
                </div>
            </f:if>
        </footer>
    </article>
</f:section>
